<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 24px; }
.grid { display: flex; flex-wrap: wrap; gap: 8px; }
.swatch { width: 56px; }
.color { height: 48px; border-radius: 12px; }
.label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-top: 4px; text-align: center; }
.group-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #64748b; margin: 16px 0 8px; }
.group-label:first-child { margin-top: 0; }
</style></head><body>
<div class="group-label">Slate</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#f8fafc;border:1px solid #e2e8f0"></div><div class="label">50</div></div>
  <div class="swatch"><div class="color" style="background:#f1f5f9"></div><div class="label">100</div></div>
  <div class="swatch"><div class="color" style="background:#e2e8f0"></div><div class="label">200</div></div>
  <div class="swatch"><div class="color" style="background:#cbd5e1"></div><div class="label">300</div></div>
  <div class="swatch"><div class="color" style="background:#94a3b8"></div><div class="label">400</div></div>
  <div class="swatch"><div class="color" style="background:#64748b"></div><div class="label">500</div></div>
  <div class="swatch"><div class="color" style="background:#475569"></div><div class="label">600</div></div>
  <div class="swatch"><div class="color" style="background:#334155"></div><div class="label">700</div></div>
  <div class="swatch"><div class="color" style="background:#1e293b"></div><div class="label">800</div></div>
  <div class="swatch"><div class="color" style="background:#0f172a"></div><div class="label">900</div></div>
</div>
<div class="group-label">Emerald (Accent)</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#ecfdf5"></div><div class="label">50</div></div>
  <div class="swatch"><div class="color" style="background:#34d399"></div><div class="label">400</div></div>
  <div class="swatch"><div class="color" style="background:#10b981"></div><div class="label">500</div></div>
  <div class="swatch"><div class="color" style="background:#059669"></div><div class="label">600</div></div>
</div>
<div class="group-label">Blue · Purple · Orange · Rose</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#eff6ff"></div><div class="label">Blue 50</div></div>
  <div class="swatch"><div class="color" style="background:#3b82f6"></div><div class="label">Blue 500</div></div>
  <div class="swatch"><div class="color" style="background:#f5f3ff"></div><div class="label">Purp 50</div></div>
  <div class="swatch"><div class="color" style="background:#8b5cf6"></div><div class="label">Purp 500</div></div>
  <div class="swatch"><div class="color" style="background:#fff7ed"></div><div class="label">Org 50</div></div>
  <div class="swatch"><div class="color" style="background:#f97316"></div><div class="label">Org 500</div></div>
  <div class="swatch"><div class="color" style="background:#fff1f2"></div><div class="label">Rose 50</div></div>
  <div class="swatch"><div class="color" style="background:#f43f5e"></div><div class="label">Rose 500</div></div>
</div>
</body></html>
