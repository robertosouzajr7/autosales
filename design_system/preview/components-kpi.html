<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.kpi { background: white; border-radius: 40px; padding: 28px; width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.07); transition: all 0.3s; border-bottom: 4px solid transparent; cursor: default; }
.kpi:hover { box-shadow: 0 20px 60px rgba(0,0,0,0.12); transform: translateY(-6px); border-bottom-color: #10b981; }
.kpi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
.icon-wrap { width: 44px; height: 44px; border-radius: 18px; background: #f8fafc; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
.kpi:hover .icon-wrap { background: #0f172a; }
.kpi:hover .icon-wrap svg { stroke: white !important; }
.kpi:hover .icon-wrap svg circle[fill] { fill: white !important; }
.trend { font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 99px; display: flex; align-items: center; gap: 2px; }
.up   { background: #ecfdf5; color: #059669; }
.down { background: #fff1f2; color: #e11d48; }
.label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.18em; color: #94a3b8; margin-bottom: 4px; }
.value { font-size: 34px; font-weight: 900; letter-spacing: -0.04em; font-style: italic; color: #0f172a; line-height: 1; }
svg { display: block; }
</style></head><body>

<!-- Leads: group / people nodes -->
<div class="kpi">
  <div class="kpi-top">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="7" r="3"/>
        <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        <path d="M21 21v-2a4 4 0 0 0-3-3.87"/>
      </svg>
    </div>
    <span class="trend up">↑ +8%</span>
  </div>
  <div class="label">Volume de Leads</div>
  <div class="value">1.284</div>
</div>

<!-- Qualificados: bot mark -->
<div class="kpi">
  <div class="kpi-top">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="8" width="20" height="13" rx="4"/>
        <circle cx="8.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
        <circle cx="15.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
        <line x1="12" y1="8" x2="12" y2="5"/>
        <circle cx="12" cy="3.5" r="1.2" fill="#10b981" stroke="none"/>
      </svg>
    </div>
    <span class="trend up">↑ +22%</span>
  </div>
  <div class="label">Leads Qualificados</div>
  <div class="value">341</div>
</div>

<!-- Agendamentos: calendar + check -->
<div class="kpi">
  <div class="kpi-top">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="17" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <path d="M9 16 L11 18 L15 14"/>
      </svg>
    </div>
    <span class="trend up">↑ +5%</span>
  </div>
  <div class="label">Agendamentos</div>
  <div class="value">67</div>
</div>

<!-- Conversão: target crosshair -->
<div class="kpi">
  <div class="kpi-top">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </div>
    <span class="trend down">↓ -1%</span>
  </div>
  <div class="label">Conversão Geral</div>
  <div class="value">26.6%</div>
</div>

</body></html>
