<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 24px; display: flex; flex-direction: column; gap: 18px; max-width: 400px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.lbl { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.22em; color: #94a3b8; padding-left: 4px; }
.wrap { position: relative; }
.ico { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #cbd5e1; font-size: 18px; line-height: 1; pointer-events: none; }
/* Standard h-14 inflated pill input — NO border */
input {
  width: 100%;
  height: 56px;
  background: #f8fafc;
  border: none;
  border-radius: 18px;
  padding: 0 20px 0 52px;
  font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 700;
  color: #0f172a;
  outline: none;
  transition: box-shadow 0.2s;
}
input:focus { box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
input::placeholder { color: #e2e8f0; font-weight: 500; }

/* Auth h-16 */
.input-auth { height: 64px; border-radius: 20px; font-size: 18px; }

/* Divider */
.div { height: 1px; background: #f1f5f9; margin: 4px 0; }
.section-lbl { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #cbd5e1; }

/* Chat input */
.chat-row { display: flex; gap: 8px; background: white; padding: 10px; border-radius: 18px; border: 1px solid #f1f5f9; align-items: center; }
.chat-row input { height: 44px; font-size: 13px; border-radius: 12px; padding: 0 16px; flex: 1; background: #f8fafc; }
.send { width: 44px; height: 44px; flex-shrink: 0; background: #0f172a; border: none; border-radius: 12px; color: white; font-size: 18px; cursor: pointer; transition: background 0.2s; }
.send:hover { background: #10b981; }
</style></head><body>

<div class="section-lbl">Standard Inputs (h-14 · No Border · Pill)</div>

<div class="field">
  <div class="lbl">Seu E-mail</div>
  <div class="wrap"><span class="ico">✉</span><input placeholder="seu@email.com"></div>
</div>

<div class="field">
  <div class="lbl">Senha</div>
  <div class="wrap"><span class="ico">🔒</span><input type="password" placeholder="••••••••"></div>
</div>

<div class="div"></div>
<div class="section-lbl">Auth Form (h-16 · Larger)</div>

<div class="field">
  <div class="lbl">Seu E-mail</div>
  <div class="wrap"><span class="ico">✉</span><input class="input-auth" placeholder="seu@email.com"></div>
</div>

<div class="div"></div>
<div class="section-lbl">Chat / Search Input</div>

<div class="chat-row">
  <input placeholder="Tire suas dúvidas...">
  <button class="send">→</button>
</div>

</body></html>
