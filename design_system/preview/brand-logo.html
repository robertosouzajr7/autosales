<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; padding: 28px; display: flex; flex-direction: column; gap: 24px; }
.row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
.section-lbl { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #cbd5e1; margin-bottom: 14px; }
.logo-wrap { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 42px; height: 42px; background: #0f172a; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.18); flex-shrink: 0; }
.logo-icon.em { background: #10b981; box-shadow: 0 8px 20px rgba(16,185,129,0.4); }
.wordmark { font-size: 22px; font-weight: 900; letter-spacing: -0.04em; text-transform: uppercase; font-style: italic; color: #0f172a; line-height: 1; }
.wordmark span { color: #10b981; }
.wordmark-dark { color: white; }
.sub { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #94a3b8; margin-top: 3px; }
.sub-dark { color: rgba(255,255,255,0.25); }
.divider { height: 1px; background: #f1f5f9; }
svg { display: block; }

/* Small nav-size variant */
.logo-sm .logo-icon { width: 32px; height: 32px; border-radius: 8px; }
.logo-sm .wordmark { font-size: 16px; }
</style></head><body>

<!-- Light background -->
<div>
  <div class="section-lbl">Fundo Claro — Padrão</div>
  <div class="row">
    <!-- Full lockup -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="8" width="20" height="13" rx="4"/>
          <circle cx="8.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
          <circle cx="15.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
          <line x1="12" y1="8" x2="12" y2="5"/>
          <circle cx="12" cy="3.5" r="1.2" fill="#10b981" stroke="none"/>
          <path d="M9 18 Q12 20.5 15 18"/>
        </svg>
      </div>
      <div>
        <div class="wordmark">AGENTES <span>VIRTUAIS</span></div>
        <div class="sub">SDR de Inteligência Artificial</div>
      </div>
    </div>

    <!-- Icon only -->
    <div class="logo-icon" style="width:56px;height:56px;border-radius:16px">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="8" width="20" height="13" rx="4"/>
        <circle cx="8.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
        <circle cx="15.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
        <line x1="12" y1="8" x2="12" y2="5"/>
        <circle cx="12" cy="3.5" r="1.2" fill="#10b981" stroke="none"/>
        <path d="M9 18 Q12 20.5 15 18"/>
      </svg>
    </div>

    <!-- Wordmark only -->
    <div class="wordmark" style="font-size:28px">AGENTES <span>VIRTUAIS</span></div>
  </div>
</div>

<div class="divider"></div>

<!-- Dark background -->
<div style="background:#0f172a;padding:24px;border-radius:20px">
  <div class="section-lbl" style="color:rgba(255,255,255,0.18)">Fundo Escuro</div>
  <div class="row">
    <!-- Full lockup on dark — emerald icon bg -->
    <div class="logo-wrap">
      <div class="logo-icon em">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="8" width="20" height="13" rx="4"/>
          <circle cx="8.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
          <circle cx="15.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
          <line x1="12" y1="8" x2="12" y2="5"/>
          <circle cx="12" cy="3.5" r="1.2" fill="#ecfdf5" stroke="none"/>
          <path d="M9 18 Q12 20.5 15 18"/>
        </svg>
      </div>
      <div>
        <div class="wordmark wordmark-dark">AGENTES <span>VIRTUAIS</span></div>
        <div class="sub sub-dark">SDR de Inteligência Artificial</div>
      </div>
    </div>

    <!-- Icon only on dark -->
    <div class="logo-icon em" style="width:56px;height:56px;border-radius:16px">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="8" width="20" height="13" rx="4"/>
        <circle cx="8.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
        <circle cx="15.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
        <line x1="12" y1="8" x2="12" y2="5"/>
        <circle cx="12" cy="3.5" r="1.2" fill="#ecfdf5" stroke="none"/>
      </svg>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- Nav/sidebar size -->
<div>
  <div class="section-lbl">Tamanho Nav & Sidebar (32px)</div>
  <div class="row">
    <div class="logo-wrap logo-sm">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="8" width="20" height="13" rx="4"/>
          <circle cx="8.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
          <circle cx="15.5" cy="14.5" r="1.5" fill="#10b981" stroke="none"/>
          <line x1="12" y1="8" x2="12" y2="5"/>
          <circle cx="12" cy="3.5" r="1" fill="#10b981" stroke="none"/>
        </svg>
      </div>
      <div class="wordmark" style="font-size:16px">AGENTES <span>VIRTUAIS</span></div>
    </div>
    <!-- sidebar dark -->
    <div style="background:#0f172a;padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:10px">
      <div class="logo-icon em" style="width:32px;height:32px;border-radius:8px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="8" width="20" height="13" rx="4"/>
          <circle cx="8.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
          <circle cx="15.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
          <line x1="12" y1="8" x2="12" y2="5"/>
          <circle cx="12" cy="3.5" r="1" fill="#ecfdf5" stroke="none"/>
        </svg>
      </div>
      <div class="wordmark wordmark-dark" style="font-size:16px">AGENTES <span>VIRTUAIS</span></div>
    </div>
  </div>
</div>

</body></html>
