<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; }
.sidebar { background: #0f172a; width: 260px; height: 480px; display: flex; flex-direction: column; border-radius: 0 20px 20px 0; overflow: hidden; }
.logo-area { height: 64px; display: flex; align-items: center; gap: 12px; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.logo-icon { width: 32px; height: 32px; background: #10b981; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(16,185,129,0.35); flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 900; letter-spacing: -0.03em; text-transform: uppercase; color: white; font-style: italic; }
.logo-text span { color: #10b981; }
.nav { flex: 1; padding: 8px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; color: #475569; transition: all 0.2s; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #94a3b8; }
.nav-item.active { background: rgba(255,255,255,0.10); color: white; }
.nav-item.active svg { stroke: #10b981; }
.nav-item svg { stroke: #334155; width: 16px; height: 16px; flex-shrink: 0; transition: stroke 0.2s; }
.nav-item:hover svg { stroke: #64748b; }
.dot { width: 5px; height: 5px; background: #10b981; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
.plan-area { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.plan-box { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 10px 12px; }
.plan-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.plan-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #1e3a5f; }
.plan-badge { background: #10b981; color: #0f172a; font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; }
.bar { height: 3px; background: #1e293b; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; width: 42%; background: #10b981; border-radius: 99px; }
</style></head><body>
<div class="sidebar">
  <div class="logo-area">
    <div class="logo-icon">
      <!-- Bot mark matching logo style -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="8" width="20" height="13" rx="4"/>
        <circle cx="8.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
        <circle cx="15.5" cy="14.5" r="1.5" fill="white" stroke="none"/>
        <line x1="12" y1="8" x2="12" y2="5"/>
        <circle cx="12" cy="3.5" r="1" fill="#10b981" stroke="none"/>
        <path d="M9 18 Q12 20 15 18"/>
      </svg>
    </div>
    <span class="logo-text">Agentes <span>Virtuais</span></span>
  </div>

  <nav class="nav">

    <!-- Dashboard: grid/layout -->
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      Dashboard <span class="dot"></span>
    </div>

    <!-- Conversas: speech bubble with signal dots -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <circle cx="9" cy="11" r="1" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="11" r="1" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Conversas
    </div>

    <!-- CRM / Leads: funnel -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 4h18l-7 8v6l-4 2V12Z"/>
      </svg>
      CRM / Leads
    </div>

    <!-- Agendamentos: calendar with check -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="17" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <path d="M9 16 L11 18 L15 14"/>
      </svg>
      Agendamentos
    </div>

    <!-- Prospecção: target with pulse -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
      Prospecção
    </div>

    <!-- Time de SDRs: bot/agent icon matching logo -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="8" width="20" height="13" rx="4"/>
        <circle cx="8.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="15.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="12" y1="8" x2="12" y2="5"/>
        <circle cx="12" cy="3.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Time de SDRs
    </div>

    <!-- Automações: lightning/flow -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2 L4 14 H11 L11 22 L20 10 H13 Z"/>
      </svg>
      Automações
    </div>

    <!-- Disparos: broadcast signal -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2 L11 13"/>
        <path d="M22 2 L15 22 L11 13 L2 9 Z"/>
      </svg>
      Disparos
    </div>

    <!-- Configurações: sliders (not gear) -->
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="9" cy="6" r="2" fill="#0f172a"/>
        <circle cx="15" cy="12" r="2" fill="#0f172a"/>
        <circle cx="9" cy="18" r="2" fill="#0f172a"/>
      </svg>
      Configurações
    </div>

  </nav>

  <div class="plan-area">
    <div class="plan-box">
      <div class="plan-row">
        <span class="plan-label">Plano Ativo</span>
        <span class="plan-badge">Pro</span>
      </div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
  </div>
</div>
</body></html>
