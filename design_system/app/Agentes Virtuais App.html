<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agentes Virtuais — App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { width: 100%; max-width: 430px; height: 100dvh; position: relative; overflow: hidden; background: #f8fafc; }
  @media (min-height: 800px) { #root { height: 100dvh; max-height: 932px; border-radius: 0; } }
  ::-webkit-scrollbar { display: none; }
  scrollbar-width: none;
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Design tokens ──
const C = {
  dark: '#0f172a', accent: '#10b981', accentDark: '#059669',
  accentBg: '#ecfdf5', accentBorder: '#d1fae5',
  bg: '#f8fafc', card: '#ffffff',
  s400: '#94a3b8', s500: '#64748b', s600: '#475569',
  s200: '#e2e8f0', s100: '#f1f5f9', s50: '#f8fafc',
  blue: '#3b82f6', blueBg: '#eff6ff',
  purple: '#8b5cf6', purpleBg: '#f5f3ff',
  orange: '#f97316', orangeBg: '#fff7ed',
  rose: '#f43f5e', roseBg: '#fff1f2',
  indigo: '#6366f1', indigoBg: '#eef2ff',
};

// ── SVG Bot Icon ──
const BotIcon = ({ size = 20, color = 'white' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="2" y="8" width="20" height="13" rx="4"/>
    <circle cx="8.5" cy="14.5" r="1.5" fill={color} stroke="none"/>
    <circle cx="15.5" cy="14.5" r="1.5" fill={color} stroke="none"/>
    <line x1="12" y1="8" x2="12" y2="5"/>
    <circle cx="12" cy="3.5" r="1.2" fill={color} stroke="none"/>
    <path d="M9 18 Q12 20.5 15 18"/>
  </svg>
);

// ── Lucide icon wrapper ──
const Icon = ({ name, size = 18, color = C.s500, style }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.display = 'block';
      el.style.color = color;
      ref.current.appendChild(el);
      lucide.createIcons({ nameAttr: 'data-lucide', nodes: [el] });
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', flexShrink:0, ...style }} />;
};

// ── Micro label ──
const Micro = ({ children, color = C.s400, style }) => (
  <span style={{ fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.2em', color, ...style }}>{children}</span>
);

// ── Score pill ──
const Score = ({ v }) => {
  const bg = v >= 80 ? C.accentBg : v >= 60 ? C.blueBg : C.purpleBg;
  const col = v >= 80 ? C.accentDark : v >= 60 ? C.blue : C.purple;
  return <span style={{ background:bg, color:col, fontSize:9, fontWeight:900, padding:'3px 8px', borderRadius:99, letterSpacing:'0.1em' }}>SCORE {v}</span>;
};

// ── KPI Card ──
const KpiCard = ({ label, value, icon, color, trend, up }) => (
  <div style={{ background:C.card, borderRadius:28, padding:'20px 18px', boxShadow:'0 4px 16px rgba(0,0,0,0.06)', display:'flex', flexDirection:'column', gap:12 }}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
      <div style={{ width:40, height:40, borderRadius:14, background:C.s50, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Icon name={icon} size={18} color={color} />
      </div>
      <span style={{ fontSize:9, fontWeight:900, padding:'3px 8px', borderRadius:99, background: up ? C.accentBg : C.roseBg, color: up ? C.accentDark : C.rose }}>
        {trend}
      </span>
    </div>
    <div>
      <Micro style={{ marginBottom:4 }}>{label}</Micro>
      <div style={{ fontSize:30, fontWeight:900, letterSpacing:'-0.04em', fontStyle:'italic', color:C.dark }}>{value}</div>
    </div>
  </div>
);

// ── Screen wrapper ──
const Screen = ({ children, bg = C.bg, style }) => (
  <div style={{ position:'absolute', inset:0, background:bg, overflowY:'auto', overflowX:'hidden', paddingBottom:80, ...style }}>
    {children}
  </div>
);

// ── Status bar ──
const StatusBar = ({ light }) => (
  <div style={{ height:44, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0 }}>
    <span style={{ fontSize:13, fontWeight:700, color: light ? 'white' : C.dark }}>9:41</span>
    <div style={{ display:'flex', gap:5, alignItems:'center' }}>
      {[...Array(4)].map((_,i) => <div key={i} style={{ width:3, height:6+i*2, borderRadius:1, background: light ? 'white' : C.dark, opacity: i < 3 ? 0.6+(i*0.2) : 1 }} />)}
      <Icon name="wifi" size={14} color={light ? 'white' : C.dark} />
      <Icon name="battery" size={14} color={light ? 'white' : C.dark} />
    </div>
  </div>
);

// ══════════════ ONBOARDING ══════════════
const slides = [
  {
    bg: C.dark,
    icon: <BotIcon size={56} color={C.accent} />,
    label: 'A NOVA GERAÇÃO DE VENDAS B2B',
    title: <>Scale suas Vendas com<br/><em style={{color:C.accent}}>SDRs Infinitos</em><br/>de IA.</>,
    sub: 'Automatize seu WhatsApp, qualifique leads 24h e deixe a IA prospectar por você.',
  },
  {
    bg: C.dark,
    features: [
      { icon:'bot', color:C.accent, bg:'rgba(16,185,129,0.15)', label:'SDRs de IA', desc:'Qualificam e pontuam leads 24/7 com score de 0 a 100.' },
      { icon:'zap', color:C.blue, bg:'rgba(59,130,246,0.15)', label:'Automações', desc:'Workflows no-code com gatilhos inteligentes.' },
      { icon:'bar-chart-3', color:C.purple, bg:'rgba(139,92,246,0.15)', label:'Analytics', desc:'Dashboard em tempo real com métricas de conversão.' },
    ]
  },
  {
    bg: C.accent,
    light: true,
    cta: true,
    icon: <Icon name="check-circle-2" size={56} color="white" />,
    label: '7 DIAS GRÁTIS · SEM CARTÃO',
    title: <>Pronto para <em>escalar</em>?</>,
    sub: 'Comece agora e tenha seus primeiros leads qualificados em menos de 24 horas.',
  }
];

const Onboarding = ({ onDone }) => {
  const [cur, setCur] = useState(0);
  const s = slides[cur];

  return (
    <div style={{ position:'absolute', inset:0, background:s.bg, display:'flex', flexDirection:'column', transition:'background 0.4s' }}>
      <StatusBar light />
      <div style={{ flex:1, display:'flex', flexDirection:'column', padding:'0 32px 40px' }}>
        {cur === 0 && (
          <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:24 }}>
            <div style={{ width:88, height:88, background:'rgba(255,255,255,0.07)', borderRadius:32, display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid rgba(255,255,255,0.1)' }}>
              {s.icon}
            </div>
            <Micro color="rgba(255,255,255,0.4)" style={{ letterSpacing:'0.25em' }}>{s.label}</Micro>
            <div style={{ fontSize:42, fontWeight:900, letterSpacing:'-0.04em', lineHeight:1, color:'white' }}>{s.title}</div>
            <div style={{ fontSize:16, fontWeight:500, color:'rgba(255,255,255,0.5)', lineHeight:1.6 }}>{s.sub}</div>
          </div>
        )}
        {cur === 1 && (
          <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:20 }}>
            <div style={{ fontSize:32, fontWeight:900, letterSpacing:'-0.03em', color:'white', lineHeight:1.1, marginBottom:8 }}>
              Tudo que você<br/><em style={{color:C.accent}}>precisa</em> unificado.
            </div>
            {s.features.map(f => (
              <div key={f.label} style={{ display:'flex', gap:16, alignItems:'center', background:'rgba(255,255,255,0.05)', borderRadius:24, padding:'18px 20px', border:'1px solid rgba(255,255,255,0.06)' }}>
                <div style={{ width:52, height:52, background:f.bg, borderRadius:18, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <Icon name={f.icon} size={22} color={f.color} />
                </div>
                <div>
                  <div style={{ fontSize:15, fontWeight:900, color:'white', marginBottom:4 }}>{f.label}</div>
                  <div style={{ fontSize:13, fontWeight:500, color:'rgba(255,255,255,0.45)', lineHeight:1.5 }}>{f.desc}</div>
                </div>
              </div>
            ))}
          </div>
        )}
        {cur === 2 && (
          <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:24 }}>
            <div style={{ width:88, height:88, background:'rgba(255,255,255,0.2)', borderRadius:32, display:'flex', alignItems:'center', justifyContent:'center' }}>
              {s.icon}
            </div>
            <Micro color="rgba(255,255,255,0.7)" style={{ letterSpacing:'0.25em' }}>{s.label}</Micro>
            <div style={{ fontSize:42, fontWeight:900, letterSpacing:'-0.04em', lineHeight:1, color:'white' }}>{s.title}</div>
            <div style={{ fontSize:16, fontWeight:500, color:'rgba(255,255,255,0.7)', lineHeight:1.6 }}>{s.sub}</div>
          </div>
        )}

        {/* Dots */}
        <div style={{ display:'flex', gap:6, marginBottom:24 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{ height:4, width: cur===i ? 28:8, borderRadius:99, background: cur===i ? (cur===2?'white':C.accent) : 'rgba(255,255,255,0.2)', transition:'all 0.3s' }} />
          ))}
        </div>

        {cur < 2 ? (
          <button onClick={() => setCur(cur+1)} style={{ height:60, background: cur===0?C.accent:'rgba(255,255,255,0.1)', border:'none', borderRadius:20, color:'white', fontFamily:'inherit', fontSize:11, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.15em', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            Próximo
            <Icon name="arrow-right" size={16} color="white" />
          </button>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <button onClick={onDone} style={{ height:60, background:'white', border:'none', borderRadius:20, color:C.accentDark, fontFamily:'inherit', fontSize:11, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.15em', cursor:'pointer' }}>
              Começar Trial Grátis
            </button>
            <button onClick={onDone} style={{ height:52, background:'transparent', border:'1px solid rgba(255,255,255,0.3)', borderRadius:20, color:'white', fontFamily:'inherit', fontSize:11, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.15em', cursor:'pointer' }}>
              Já tenho conta
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

// ══════════════ LOGIN ══════════════
const Login = ({ onLogin }) => {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const go = () => { setLoading(true); setTimeout(onLogin, 1200); };
  return (
    <div style={{ position:'absolute', inset:0, background:C.dark, display:'flex', flexDirection:'column' }}>
      <StatusBar light />
      <div style={{ flex:1, display:'flex', flexDirection:'column', padding:'20px 32px 40px', justifyContent:'center', gap:32 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ width:52, height:52, background:C.accent, borderRadius:18, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 8px 24px rgba(16,185,129,0.4)' }}>
            <BotIcon size={26} color="white" />
          </div>
          <div>
            <div style={{ fontSize:20, fontWeight:900, color:'white', letterSpacing:'-0.02em', textTransform:'uppercase', fontStyle:'italic' }}>Agentes <span style={{color:C.accent}}>Virtuais</span></div>
            <Micro color="rgba(255,255,255,0.3)">SDR de Inteligência Artificial</Micro>
          </div>
        </div>
        <div>
          <div style={{ fontSize:32, fontWeight:900, color:'white', letterSpacing:'-0.03em', lineHeight:1.1 }}>Bem-vindo<br/><em style={{color:C.accent}}>de volta.</em></div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {[
            { placeholder:'seu@email.com', value:email, set:setEmail, icon:'mail', type:'email' },
            { placeholder:'••••••••', value:pass, set:setPass, icon:'lock', type:'password' }
          ].map(f => (
            <div key={f.icon} style={{ position:'relative' }}>
              <Icon name={f.icon} size={16} color="rgba(255,255,255,0.3)" style={{ position:'absolute', left:18, top:'50%', transform:'translateY(-50%)' }} />
              <input
                type={f.type} placeholder={f.placeholder} value={f.value}
                onChange={e => f.set(e.target.value)}
                style={{ width:'100%', height:60, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:20, paddingLeft:50, paddingRight:20, fontFamily:'inherit', fontSize:16, fontWeight:600, color:'white', outline:'none', caretColor:C.accent }}
              />
            </div>
          ))}
          <button onClick={go} disabled={loading} style={{ height:60, background:C.accent, border:'none', borderRadius:20, color:'white', fontFamily:'inherit', fontSize:11, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.15em', cursor:'pointer', marginTop:8, boxShadow:'0 12px 32px rgba(16,185,129,0.4)', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            {loading ? <><Icon name="loader" size={16} color="white" /> Entrando...</> : 'Entrar na Plataforma'}
          </button>
        </div>
        <div style={{ textAlign:'center', fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.3)' }}>
          Não tem conta? <span style={{ color:C.accent, cursor:'pointer' }} onClick={onLogin}>Trial grátis por 7 dias</span>
        </div>
      </div>
    </div>
  );
};

// ══════════════ TOPBAR ══════════════
const TopBar = ({ title, sub, light, onNotif, badge, right }) => (
  <div style={{ padding:'12px 20px 16px', background: light ? C.dark : C.card, borderBottom: light ? 'none' : `1px solid ${C.s100}` }}>
    <StatusBar light={light} />
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:4 }}>
      <div>
        <div style={{ fontSize:28, fontWeight:900, letterSpacing:'-0.03em', textTransform:'uppercase', fontStyle:'italic', color: light ? 'white' : C.dark }}>{title} {sub && <em style={{color:C.accent}}>{sub}</em>}</div>
        {badge && <Micro color={ light ? 'rgba(255,255,255,0.3)' : C.s400 }>{badge}</Micro>}
      </div>
      <div style={{ display:'flex', gap:10, alignItems:'center' }}>
        {right}
        <div onClick={onNotif} style={{ width:40, height:40, borderRadius:14, background: light ? 'rgba(255,255,255,0.08)' : C.s50, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', position:'relative' }}>
          <Icon name="bell" size={18} color={light ? 'white' : C.s500} />
          <div style={{ position:'absolute', top:8, right:8, width:7, height:7, background:C.accent, borderRadius:'50%', border:`2px solid ${light?C.dark:C.card}` }} />
        </div>
        <div style={{ width:40, height:40, background:C.accent, borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900, fontSize:12, color:'white', flexShrink:0 }}>ME</div>
      </div>
    </div>
  </div>
);

// ══════════════ DASHBOARD ══════════════
const Dashboard = ({ goTo }) => {
  const kpis = [
    { label:'Leads Ativos', value:'1.284', icon:'users', color:C.blue, trend:'↑ +8%', up:true },
    { label:'Qualificados', value:'341', icon:'bot', color:C.accent, trend:'↑ +22%', up:true },
    { label:'Agendamentos', value:'67', icon:'calendar', color:C.purple, trend:'↑ +5%', up:true },
    { label:'Conversão', value:'26.6%', icon:'trending-up', color:C.orange, trend:'↓ -1%', up:false },
  ];
  const bars = [90,65,45,30,18,52,74];
  const barLabels = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const leads = [
    { n:'João Silva', s:'Qualificado', src:'WhatsApp', score:82, c:'#0f172a' },
    { n:'Ana Pereira', s:'Proposta', src:'LinkedIn', score:91, c:C.blue },
    { n:'Carlos Mota', s:'Contato', src:'Site', score:55, c:C.purple },
    { n:'Beatriz Lima', s:'Agendado', src:'WhatsApp', score:88, c:C.accent },
  ];
  return (
    <Screen>
      <div style={{ background:C.dark, paddingBottom:24 }}>
        <StatusBar light />
        <div style={{ padding:'8px 20px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <Micro color="rgba(255,255,255,0.4)">BOM DIA, EMPRESA</Micro>
            <div style={{ fontSize:26, fontWeight:900, letterSpacing:'-0.03em', color:'white', marginTop:2 }}>Painel <em style={{color:C.accent}}>Estratégico</em></div>
            <Micro color="rgba(255,255,255,0.25)">Real-time Performance Metrics</Micro>
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <div style={{ width:40, height:40, background:'rgba(255,255,255,0.08)', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', position:'relative' }}>
              <Icon name="bell" size={18} color="white" />
              <div style={{ position:'absolute', top:8, right:8, width:7, height:7, background:C.accent, borderRadius:'50%' }} />
            </div>
            <div style={{ width:40, height:40, background:C.accent, borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900, fontSize:12, color:'white' }}>ME</div>
          </div>
        </div>
        {/* Quick stats strip */}
        <div style={{ display:'flex', gap:12, overflowX:'auto', padding:'20px 20px 4px' }}>
          {[{icon:'bot',label:'SDRs Ativos',value:'3',color:C.accent},{icon:'message-square',label:'Chats Hoje',value:'47',color:C.blue},{icon:'zap',label:'Automações',value:'12',color:C.purple}].map(q => (
            <div key={q.label} style={{ background:'rgba(255,255,255,0.07)', borderRadius:20, padding:'14px 18px', flexShrink:0, border:'1px solid rgba(255,255,255,0.06)', minWidth:110 }}>
              <Icon name={q.icon} size={16} color={q.color} />
              <div style={{ fontSize:22, fontWeight:900, color:'white', letterSpacing:'-0.03em', fontStyle:'italic', marginTop:8 }}>{q.value}</div>
              <Micro color="rgba(255,255,255,0.3)" style={{ marginTop:2, display:'block' }}>{q.label}</Micro>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding:'20px 16px', display:'flex', flexDirection:'column', gap:16 }}>
        {/* KPI Grid */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          {kpis.map(k => <KpiCard key={k.label} {...k} />)}
        </div>

        {/* Bar chart */}
        <div style={{ background:C.card, borderRadius:28, padding:'20px', boxShadow:'0 4px 16px rgba(0,0,0,0.06)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <div>
              <div style={{ fontSize:16, fontWeight:900, letterSpacing:'-0.02em' }}>Fluxo de Atividade</div>
              <Micro>Leads por dia da semana</Micro>
            </div>
            <span style={{ fontSize:9, fontWeight:900, padding:'4px 10px', borderRadius:10, background:C.accentBg, color:C.accentDark, letterSpacing:'0.12em' }}>REAL-TIME</span>
          </div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:6, height:100 }}>
            {bars.map((h,i) => (
              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6, height:'100%', justifyContent:'flex-end' }}>
                <div style={{ width:'100%', height:`${h}%`, background:`linear-gradient(to top, ${C.accent}, #34d399)`, borderRadius:'6px 6px 0 0', opacity: i===6?0.4:1 }} />
                <Micro style={{ fontSize:8 }}>{barLabels[i]}</Micro>
              </div>
            ))}
          </div>
        </div>

        {/* Funil */}
        <div style={{ background:C.dark, borderRadius:28, padding:'20px', boxShadow:'0 16px 50px rgba(0,0,0,0.2)', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:-40, right:-40, width:160, height:160, background:'rgba(16,185,129,0.12)', borderRadius:'50%', filter:'blur(60px)' }} />
          <div style={{ position:'relative', zIndex:1 }}>
            <div style={{ fontSize:15, fontWeight:900, color:C.accent, textTransform:'uppercase', fontStyle:'italic', letterSpacing:'-0.01em', marginBottom:4 }}>Conversão de Funil</div>
            <Micro color="rgba(255,255,255,0.25)" style={{ marginBottom:16, display:'block' }}>Efetividade da Qualificação IA</Micro>
            {[{n:'Novos Leads',p:100,c:C.blue},{n:'Contato Feito',p:72,c:C.purple},{n:'Qualificados',p:44,c:C.accent},{n:'Agendamentos',p:27,c:C.orange}].map(f => (
              <div key={f.n} style={{ marginBottom:14 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <Micro color="rgba(255,255,255,0.3)">{f.n}</Micro>

  const contacts = [
    { n:'João Silva', preview:'Pode agendar amanhã?', time:'09:42', unread:true, active:true, c:C.dark, score:82 },

// ══════════════ APP SHELL ══════════════
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#10b981",
  "darkMode": false
}/*EDITMODE-END*/;

const App = () => {
  const stored = localStorage.getItem('av_screen');
  const [screen, setScreen] = useState(stored || 'onboarding');

  const goTo = useCallback((s) => {
    setScreen(s);
    localStorage.setItem('av_screen', s);
  }, []);

  const noNav = ['onboarding','login'].includes(screen);

  const renderScreen = () => {
    switch(screen) {
      case 'onboarding': return <Onboarding onDone={() => goTo('login')} />;
      case 'login': return <Login onLogin={() => goTo('dashboard')} />;
      case 'dashboard': return <Dashboard goTo={goTo} />;
      case 'crm': return <CRM />;
      case 'conversations': return <Conversations />;
      case 'sdrs': return <SDRs />;
      case 'automacoes': return <Automacoes />;
      case 'analytics': return <Analytics />;
      case 'agendamentos': return <Agendamentos />;
      case 'configuracoes': return <Configuracoes goTo={goTo} />;
      default: return <Dashboard goTo={goTo} />;
    }
  };

  // Tweaks
  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').style.display = 'flex';
      } else if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').style.display = 'none';
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <div style={{ position:'relative', width:'100%', height:'100%' }}>
      {renderScreen()}
      {!noNav && <BottomNav active={screen} goTo={goTo} />}
      {/* Tweaks panel */}
      <div id="tweaks-panel" style={{ display:'none', position:'absolute', bottom:88, right:12, background:'white', borderRadius:20, padding:'16px', boxShadow:'0 8px 32px rgba(0,0,0,0.15)', flexDirection:'column', gap:12, zIndex:300, minWidth:180 }}>
        <div style={{ fontSize:11, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.15em', color:C.dark, borderBottom:`1px solid ${C.s100}`, paddingBottom:8 }}>Tweaks</div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:C.s400, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.12em' }}>Tela</div>
          {['dashboard','crm','conversations','sdrs','automacoes','analytics','agendamentos','configuracoes'].map(s => (
            <div key={s} onClick={() => goTo(s)} style={{ padding:'6px 10px', borderRadius:10, cursor:'pointer', fontSize:12, fontWeight:700, color:screen===s?C.accent:C.s600, background:screen===s?C.accentBg:'transparent', marginBottom:2, textTransform:'capitalize' }}>
              {s.replace('automacoes','Automações').replace('configuracoes','Config').replace('agendamentos','Agenda').replace('conversations','Conversas')}
            </div>
          ))}
        </div>
        <button onClick={() => goTo('onboarding')} style={{ height:36, background:C.dark, border:'none', borderRadius:12, color:'white', fontFamily:'inherit', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:'0.1em', cursor:'pointer' }}>
          ↺ Reset
        </button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
