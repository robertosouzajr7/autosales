services:
  # --- Frontend (React/Vite) ---
  venda-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    networks:
      - vend-network

  # --- Backend Original (Express - server.js) ---
  venda-api-express:
    build:
      context: .
      dockerfile: Dockerfile.api-express
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - baileys-auth:/app/auth_info_baileys
    env_file:
      - .env
    environment:
      - PORT=3000
    networks:
      - vend-network

  # --- Banco de Dados PostgreSQL (Configurado para o AutoSales) ---
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: autosales
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: autosales
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vend-network

networks:
  vend-network:
    driver: bridge

volumes:
  baileys-auth:
  postgres-data:
